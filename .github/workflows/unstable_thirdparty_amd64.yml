name: unstable_thirdparty_amd64

on:
  workflow_dispatch:

  schedule:
    - cron:  '0 15 * * *'

  # push:
  #   branches:
  #     - master

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  VARIANT: unstable
  APP_LIST: thirdparty
  BASE_IMAGE: ctumrs/ros_jazzy:latest
  BUILDER_IMAGE: jazzy_builder_amd_${{github.RUN_ID}}
  ARTIFACTS_FOLDER: /tmp/artifacts

jobs:

  init-artifacts:
    runs-on: ubuntu-22.04
    env:
      PUSH_TOKEN: ${{secrets.PUSH_TOKEN}}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v7
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
      - id: init_artifacts
        run: |
          mkdir -p ${{env.ARTIFACTS_FOLDER}}
      - id: prime_image
        run: |
          ./ci_scripts/docker/prime_image/prime_image.sh ${{env.BASE_IMAGE}} ${{env.BUILDER_IMAGE}} ${{env.VARIANT}} ${{env.ARTIFACTS_FOLDER}} buildfarm2
      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: ${{env.ARTIFACTS_FOLDER}}
          overwrite: true

  generate-jobs:
    needs: init-artifacts
    runs-on: ubuntu-22.04
    outputs:
      group_1: ${{steps.generate.outputs.group_1}}
      group_2: ${{steps.generate.outputs.group_2}}
      group_3: ${{steps.generate.outputs.group_3}}
      group_last: ${{steps.generate.outputs.group_last}}
      app_list: ${{steps.generate.outputs.app_list}}
      variant: ${{steps.generate.outputs.variant}}
      base_image: ${{steps.generate.outputs.base_image}}
      builder_image: ${{steps.generate.outputs.builder_image}}
      artifacts_folder: ${{steps.generate.outputs.artifacts_folder}}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v7
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
          token: ${{secrets.PUSH_TOKEN}}
      - id: generate
        run: |
          JSON_GROUPS=$(./scripts/get_build_matrix.sh ${{env.APP_LIST}} ${{env.VARIANT}} true)
          echo "group_1=$(echo $JSON_GROUPS | jq -c '.group_1 // []')" >> "$GITHUB_OUTPUT"
          echo "group_2=$(echo $JSON_GROUPS | jq -c '.group_2 // []')" >> "$GITHUB_OUTPUT"
          echo "group_3=$(echo $JSON_GROUPS | jq -c '.group_3 // []')" >> "$GITHUB_OUTPUT"
          echo "group_last=$(echo $JSON_GROUPS | jq -c '.group_last // []')" >> "$GITHUB_OUTPUT"
          # the env block is the single source of truth, republish it for the
          # reusable workflow calls, which cannot read the env context
          echo "app_list=${{env.APP_LIST}}" >> "$GITHUB_OUTPUT"
          echo "variant=${{env.VARIANT}}" >> "$GITHUB_OUTPUT"
          echo "base_image=${{env.BASE_IMAGE}}" >> "$GITHUB_OUTPUT"
          echo "builder_image=${{env.BUILDER_IMAGE}}" >> "$GITHUB_OUTPUT"
          echo "artifacts_folder=${{env.ARTIFACTS_FOLDER}}" >> "$GITHUB_OUTPUT"

  build-group-1:
    needs: generate-jobs
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_build_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_1 }}
      runs_on: ubuntu-22.04
      max_parallel: 5
      app_list: ${{ needs.generate-jobs.outputs.app_list }}
      variant: ${{ needs.generate-jobs.outputs.variant }}
      base_image: ${{ needs.generate-jobs.outputs.base_image }}
      builder_image: ${{ needs.generate-jobs.outputs.builder_image }}
      artifacts_folder: ${{ needs.generate-jobs.outputs.artifacts_folder }}
    secrets: inherit

  build-group-2:
    needs: [generate-jobs, build-group-1]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_build_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_2 }}
      runs_on: ubuntu-22.04
      max_parallel: 5
      app_list: ${{ needs.generate-jobs.outputs.app_list }}
      variant: ${{ needs.generate-jobs.outputs.variant }}
      base_image: ${{ needs.generate-jobs.outputs.base_image }}
      builder_image: ${{ needs.generate-jobs.outputs.builder_image }}
      artifacts_folder: ${{ needs.generate-jobs.outputs.artifacts_folder }}
    secrets: inherit

  build-group-3:
    needs: [generate-jobs, build-group-2]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_build_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_3 }}
      runs_on: ubuntu-22.04
      max_parallel: 5
      app_list: ${{ needs.generate-jobs.outputs.app_list }}
      variant: ${{ needs.generate-jobs.outputs.variant }}
      base_image: ${{ needs.generate-jobs.outputs.base_image }}
      builder_image: ${{ needs.generate-jobs.outputs.builder_image }}
      artifacts_folder: ${{ needs.generate-jobs.outputs.artifacts_folder }}
    secrets: inherit

  build-group-last:
    needs: [generate-jobs, build-group-3]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_build_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_last }}
      runs_on: ubuntu-22.04
      max_parallel: 1
      app_list: ${{ needs.generate-jobs.outputs.app_list }}
      variant: ${{ needs.generate-jobs.outputs.variant }}
      base_image: ${{ needs.generate-jobs.outputs.base_image }}
      builder_image: ${{ needs.generate-jobs.outputs.builder_image }}
      artifacts_folder: ${{ needs.generate-jobs.outputs.artifacts_folder }}
    secrets: inherit

  collect-artifacts:
    needs: [generate-jobs, build-group-1, build-group-2, build-group-3, build-group-last]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_collect_artifacts.yml
    with:
      runs_on: ubuntu-22.04
      variant: ${{ needs.generate-jobs.outputs.variant }}
      artifacts_folder: ${{ needs.generate-jobs.outputs.artifacts_folder }}
    secrets: inherit
