name: unstable_nonbloom_amd64

on:
  workflow_dispatch:

  schedule:
    - cron:  '0 12 * * *'

  # push:
  #   branches:
  #     - master

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  VARIANT: unstable
  APP_LIST: nonbloom
  BASE_IMAGE: ctumrs/ros_jazzy:latest
  BUILDER_IMAGE: jazzy_builder_amd_${{github.RUN_ID}}
  ARTIFACTS_FOLDER: /tmp/artifacts

jobs:

  init-artifacts:
    runs-on: ubuntu-22.04
    env:
      PUSH_TOKEN: ${{secrets.PUSH_TOKEN}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
      - id: init_artifacts
        run: |
          mkdir -p ${{env.ARTIFACTS_FOLDER}}
      - id: prime_image
        run: |
          ./ci_scripts/docker/prime_image/prime_image.sh ${{env.BASE_IMAGE}} ${{env.BUILDER_IMAGE}} ${{env.VARIANT}} ${{env.ARTIFACTS_FOLDER}} buildfarm2
      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: ${{env.ARTIFACTS_FOLDER}}
          overwrite: true

  generate-jobs:
    needs: init-artifacts
    runs-on: ubuntu-22.04
    outputs:
      group_1: ${{steps.generate.outputs.group_1}}
      group_2: ${{steps.generate.outputs.group_2}}
      group_3: ${{steps.generate.outputs.group_3}}
      group_last: ${{steps.generate.outputs.group_last}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
          token: ${{secrets.PUSH_TOKEN}}
      - id: generate
        run: |
          JOB_STRATEGY_MATRIX=$(./scripts/get_nonbloom_build_matrix.sh ${{env.APP_LIST}})
          echo "group_last=$JOB_STRATEGY_MATRIX" >> "$GITHUB_OUTPUT"

  build-group-last:
    needs: generate-jobs
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_build_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_last }}
      runs_on: ubuntu-22.04
      max_parallel: 1
      build_script: ./scripts/nonbloom_build/build.sh
      app_list: ${{ env.APP_LIST }}
      variant: ${{ env.VARIANT }}
      base_image: ${{ env.BASE_IMAGE }}
      builder_image: ${{ env.BUILDER_IMAGE }}
      artifacts_folder: ${{ env.ARTIFACTS_FOLDER }}
    secrets: inherit
