name: stable_mrs_dockers

on:
  workflow_dispatch:

  schedule:
    - cron:  '0 15 * * *'

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  VARIANT: stable
  APP_LIST: mrs

jobs:

  generate-jobs:
    runs-on: ubuntu-22.04
    outputs:
      group_1: ${{steps.generate.outputs.group_1}}
      group_2: ${{steps.generate.outputs.group_2}}
      group_3: ${{steps.generate.outputs.group_3}}
      group_last: ${{steps.generate.outputs.group_last}}
    env:
      PUSH_TOKEN: ${{secrets.PUSH_TOKEN}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
          token: ${{secrets.PUSH_TOKEN}}
      - id: generate
        run: |
          JOB_STRATEGY_MATRIX=$(./scripts/get_docker_build_matrix.sh ${{env.APP_LIST}} ${{env.VARIANT}})
          echo "group_last=$JOB_STRATEGY_MATRIX" >> "$GITHUB_OUTPUT"

  build-group-last:
    needs: generate-jobs
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/reusable_docker_group.yml
    with:
      group_json: ${{ needs.generate-jobs.outputs.group_last }}
      runs_on: ubuntu-22.04
      max_parallel: 1
      build_script: ./scripts/docker_build/build.sh
      app_list: ${{ env.APP_LIST }}
      variant: ${{ env.VARIANT }}
    secrets: inherit
