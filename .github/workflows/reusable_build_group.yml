name: reusable_build_group

on:
  workflow_call:
    inputs:
      group_json:
        description: 'JSON array of jobs in this group'
        required: true
        type: string
      runs_on:
        description: 'Runner environment (e.g., ubuntu-22.04 or ubuntu-22.04-arm)'
        required: true
        type: string
      max_parallel:
        description: 'Maximum number of parallel jobs'
        required: true
        type: number
      build_script:
        description: 'Path to the build script to run'
        required: true
        type: string
      app_list:
        description: 'APP_LIST environment variable'
        required: true
        type: string
      variant:
        description: 'VARIANT environment variable'
        required: true
        type: string
      base_image:
        description: 'BASE_IMAGE environment variable (optional)'
        required: false
        type: string
        default: ''
      builder_image:
        description: 'BUILDER_IMAGE environment variable (optional)'
        required: false
        type: string
        default: ''
      artifacts_folder:
        description: 'ARTIFACTS_FOLDER environment variable (optional)'
        required: false
        type: string
        default: '/tmp/artifacts'
    secrets:
      PUSH_TOKEN:
        required: true

jobs:
  build-jobs:
    if: inputs.group_json != '[]' && inputs.group_json != ''
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 360 # 6 hour timeout
    strategy:
      matrix:
        job: ${{ fromJson(inputs.group_json) }}
      max-parallel: ${{ inputs.max_parallel }}
      fail-fast: false
    env:
      PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      APP_LIST: ${{ inputs.app_list }}
      VARIANT: ${{ inputs.variant }}
      BASE_IMAGE: ${{ inputs.base_image }}
      BUILDER_IMAGE: ${{ inputs.builder_image }}
      ARTIFACTS_FOLDER: ${{ inputs.artifacts_folder }}
    steps:
      - name: Load base artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: ${{env.ARTIFACTS_FOLDER}}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Checkout CI scripts
        uses: actions/checkout@v7
        with:
          repository: ctu-mrs/ci_scripts
          ref: ros2
          path: ci_scripts
          token: ${{secrets.PUSH_TOKEN}}
      - id: build
        run: |
          # The inputs.build_script could be ros_build or nonbloom_build.
          # Both scripts take: $APP_LIST $VARIANT "$PACKAGE" $BASE_IMAGE $BUILDER_IMAGE $ARTIFACTS_FOLDER
          ${{ inputs.build_script }} ${{env.APP_LIST}} ${{env.VARIANT}} "${{matrix.job}}" ${{env.BASE_IMAGE}} ${{env.BUILDER_IMAGE}} ${{env.ARTIFACTS_FOLDER}}
      - name: Store job artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts_${{ matrix.job }}
          path: ${{env.ARTIFACTS_FOLDER}}
          overwrite: true

  merge-artifacts:
    if: inputs.group_json != '[]' && inputs.group_json != ''
    needs: build-jobs
    runs-on: ubuntu-22.04
    steps:
      - name: Download all partial artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/all_artifacts
      - name: Merge artifacts
        run: |
          mkdir -p /tmp/merged_artifacts
          
          # Base sha is identical in all, just copy the first one found
          find /tmp/all_artifacts -name "base_sha.txt" -print -quit | xargs -I {} cp {} /tmp/merged_artifacts/
          
          # Merge compiled.txt by unique lines
          touch /tmp/merged_artifacts/compiled.txt
          find /tmp/all_artifacts -name "compiled.txt" -exec cat {} + | sort -u > /tmp/merged_artifacts/compiled.txt
          
          # Merge rosdep.yaml securely using python (since it's a flat dict of lists)
          cat << 'EOF' > /tmp/merge_rosdep.py
          import yaml
          import glob

          merged = {}
          for file in glob.glob("/tmp/all_artifacts/*/rosdep.yaml"):
              try:
                  with open(file, 'r') as f:
                      data = yaml.safe_load(f)
                      if data:
                          merged.update(data)
              except Exception as e:
                  pass

          with open("/tmp/merged_artifacts/rosdep.yaml", "w") as f:
              yaml.dump(merged, f)
          EOF
          python3 /tmp/merge_rosdep.py

      - name: Upload merged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: /tmp/merged_artifacts
          overwrite: true
